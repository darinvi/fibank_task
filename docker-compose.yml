services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fibank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fibank}
      POSTGRES_DB: ${POSTGRES_DB:-fibank}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fibank} -d ${POSTGRES_DB:-fibank}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CORS_ORIGINS: http://localhost:5173,http://localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-fibank}:${POSTGRES_PASSWORD:-fibank}@postgres:5432/${POSTGRES_DB:-fibank}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
